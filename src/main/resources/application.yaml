spring:
  profiles:
    default: dev
  flyway:
    enabled: true
    locations: classpath:db/migration
  config:
    import:
      - optional:file:./env/db.env[.properties]
      - optional:file:./env/api.env[.properties]
  application:
    name: nextroute
  task:
    scheduling:
      pool:
        size: 3
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      timeout: 1000ms

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:mydatabase}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 1000
    open-in-view: false

odsay:
  api:
    key: ${ODSAY_API_KEY:test}
    base-url: https://api.odsay.com/v1/api

tmap:
  app-key: ${TMAP_APP_KEY:test}
  base-url: https://apis.openapi.sk.com
  timeout-ms: 1500
  retry-on-failure: true

kakao:
  api:
    key: ${KAKAO_REST_API_KEY}
  map:
    js-key: ${KAKAO_MAP_JS_KEY:}
gong:
  api:
    key: ${GONG_API}
seoul:
  api:
    bus-key: ${SEOUL_BUS_API:test}
    bus-base-url: http://ws.bus.go.kr/api/rest
    bus-route-key: ${SEOUL_BUS_ROUTE:test}
    seoul-bus-use-key: ${SEOUL_BUS_USE}
    seoul-base-api-url: http://openapi.seoul.go.kr:8088
    subway-key: ${SEOUL_SUBWAY_API:test}
    subway-base-url: http://swopenAPI.seoul.go.kr/api/subway
    subway-arrival-key: ${SEOUL_SUBWAY_ARRIVAL:test}
    subway-master-key: ${SEOUL_SUBWAY_MASTER}
    subway-route-key: ${SEOUL_SUBWAY_ROUTE}
    subway-tago-base-url: http://apis.data.go.kr/1613000/SubwayInfo



collector:
  bus-arrival:
    enabled: false
    cron: "0 */10 * * * *"
    daily-budget: 1000
    target-route-names:
      - "271"    # 1위  25,758
      - "143"    # 2위  24,799
      - "130"    # 3위  24,090
      - "272"    # 4위  21,168
      - "421"    # 5위  21,089
      - "152"    # 6위  20,933
      - "273"    # 7위  20,847
      - "420"    # 8위  20,415
      - "160"    # 9위  20,141
      - "142"    # 10위 20,018
  bus-position:
    enabled: false
    cron: "0 */3 * * * *"
  subway-arrival: # DEPRECATED
    enabled: false
    cron: "0 */1 * * * *"
    flush-cron: "0 */30 * * * *"
    reset-cron: "0 0 5 * * *"
  static-data:
    cron: "0 0 3 * * *"


logging:
  level:
    watoo.grd.nextroute: INFO
  file:
    name: logs/nextroute.log
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 30

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

realtime:
  subway:
    enabled: true
    poll-interval-ms: 10000
    active-hours:
      start: "04:30"
      end: "01:00"
    snapshot-ttl-seconds: 20
    persist-raw-arrivals: true

batch:
  arrival-event:
    enabled: true
  match-issue:
    enabled: true
  inferred-completion:
    enabled: true
    line-ids: "1002,1005,1006,1007"
    dedup-window-minutes: 5
  delay-truth:
    enabled: true
    # v1: legacy ORDINAL 강제 매칭 + OUTLIER_DELAY 학습 제외
    # v2: count guard + 30분 time-window + known-known destination hard reject
    matching-version: v2
    # V2 시간창. |delay| 초과 시 group-level reject → truth row 미생성, issue로만 저장
    max-match-distance-seconds: 1800
