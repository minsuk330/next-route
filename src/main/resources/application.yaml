spring:
  profiles:
    default: dev
  flyway:
    enabled: true
    locations: classpath:db/migration
  config:
    import:
      - optional:file:./env/db.env[.properties]
      - optional:file:./env/api.env[.properties]
      - optional:file:./env/toss.env[.properties]
  application:
    name: nextroute
  task:
    scheduling:
      pool:
        size: 3
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      timeout: 1000ms

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:mydatabase}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    # ddl-auto / flyway baseline 등 환경별 값은 application-{dev,prod}.yaml 참고
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 1000
        # bulk insert/update 튜닝 — chunk saveAll 처리량 향상.
        # 같은 entity 종류의 SQL을 batch 단위로 묶어 JDBC에 전송한다.
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        # batch_versioned_data: 버전 컬럼이 있는 entity 업데이트도 batch 가능.
        # ml_subway_delay_truth / subway_arrival_event_match_issue는 멱등성 위해
        # delete-and-insert만 사용하므로 update batch는 영향 미미. 안전 차원에서 on.
        batch_versioned_data: true
    open-in-view: false

odsay:
  api:
    key: ${ODSAY_API_KEY:test}
    base-url: https://api.odsay.com/v1/api

tmap:
  app-key: ${TMAP_APP_KEY:test}
  base-url: https://apis.openapi.sk.com
  timeout-ms: 1500
  retry-on-failure: true

ml:
  predictor:
    base-url: ${ML_PREDICTOR_URL:http://localhost:8001}
    # enabled 는 application-{dev,prod}.yaml 에서 설정
    timeout-ms: 3000

route:
  transfer-arrival:
    enabled: ${TRANSFER_ARRIVAL_ENABLED:true}
    deadline-ms: ${TRANSFER_ARRIVAL_DEADLINE_MS:1500}
    cache-ttl-seconds: ${TRANSFER_ARRIVAL_CACHE_TTL:15}
    max-concurrent-external-calls: ${TRANSFER_ARRIVAL_MAX_CONCURRENT:8}
    external-call-acquire-ms: ${TRANSFER_ARRIVAL_ACQUIRE_MS:500}
    max-external-calls-per-search: ${TRANSFER_ARRIVAL_MAX_CALLS:12}

transfer:
  predict:
    deadline-ms: ${TRANSFER_PREDICT_DEADLINE_MS:2500}
    max-future-minutes: ${TRANSFER_PREDICT_MAX_FUTURE_MIN:40}
    past-grace-seconds: ${TRANSFER_PREDICT_PAST_GRACE_SEC:60}

bus:
  quota:
    search:
      # collector 몫(collector.bus-*.daily-budget)과 합이 provider 일일 한도를 넘지 않게 설정
      arrival: ${SEARCH_QUOTA_ARRIVAL:5000}
      position: ${SEARCH_QUOTA_POSITION:5000}

kakao:
  api:
    key: ${KAKAO_REST_API_KEY}
  map:
    js-key: ${KAKAO_MAP_JS_KEY:}
gong:
  api:
    key: ${GONG_API}
seoul:
  api:
    bus-key: ${SEOUL_BUS_API:test}
    bus-base-url: http://ws.bus.go.kr/api/rest
    bus-route-key: ${SEOUL_BUS_ROUTE:test}
    seoul-bus-use-key: ${SEOUL_BUS_USAGE}
    seoul-base-api-url: http://openapi.seoul.go.kr:8088
    subway-key: ${SEOUL_SUBWAY_API:test}
    subway-base-url: http://swopenAPI.seoul.go.kr/api/subway
    subway-arrival-key: ${SEOUL_SUBWAY_ARRIVAL:test}
    subway-master-key: ${SEOUL_SUBWAY_MASTER}
    subway-route-key: ${SEOUL_SUBWAY_ROUTE}
    subway-tago-base-url: http://apis.data.go.kr/1613000/SubwayInfo

toss:
  login:
    base-url: ${TOSS_LOGIN_BASE_URL:https://apps-in-toss-api.toss.im}
    # mTLS 클라이언트 인증서(PKCS12). 미설정 시 토스 서버통신 실패(부팅은 됨)
    key-store-path: ${TOSS_MTLS_KEYSTORE_PATH:}
    key-store-password: ${TOSS_MTLS_KEYSTORE_PASSWORD:}
    trust-store-path: ${TOSS_MTLS_TRUSTSTORE_PATH:}
    trust-store-password: ${TOSS_MTLS_TRUSTSTORE_PASSWORD:}
    # 사용자정보 PII 복호화 키(Base64) + AAD. 콘솔→이메일 수신
    decrypt-key: ${TOSS_DECRYPT_KEY:}
    aad: ${TOSS_DECRYPT_AAD:TOSS}
    # 연결끊기 콜백 Basic Auth
    callback-username: ${TOSS_CALLBACK_USERNAME:}
    callback-password: ${TOSS_CALLBACK_PASSWORD:}
    connect-timeout-ms: 3000
    read-timeout-ms: 5000
    max-retries: 3

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET:change-me-this-is-a-dev-only-jwt-secret-please-override}
    issuer: ${AUTH_JWT_ISSUER:nextroute}
    access-ttl-seconds: ${AUTH_JWT_ACCESS_TTL:3600}
    refresh-ttl-seconds: ${AUTH_JWT_REFRESH_TTL:1209600}



collector:
  # *.enabled 는 application-{dev,prod}.yaml 에서 설정
  bus-arrival:
    cron: "0 * * * * *"
    active-hours:
      start: "03:30"
      end: "02:30"
    finalize-miss-threshold: 2
    stale-threshold-minutes: 5
    included-arrival-orders:
      - 1
    excluded-arrival-messages:
      - "출발대기"
    daily-budget: 50000
    target-route-names:
      - "143"
      - "272"
      - "160"
      - "271"
      - "130"
      - "273"
      - "163"
      - "150"
      - "152"
      - "147"
      - "360"
      - "340"
      - "142"
      - "140"
      - "146"
      - "5531"
      - "202"
      - "120"
      - "420"
      - "421"
      - "641"
      - "동작01"
      - "303"
      - "262"
      - "144"
      - "301"
      - "5524"
      - "370"
      - "4318"
      - "720"

  bus-position:
    cron: "0 * * * * *"
    # 도착 수집과 독립 예산. 30노선 × 분당 × active-hours(23h) ≈ 41,400 호출/일.
    daily-budget: 50000
    active-hours:
      start: "03:30"
      end: "02:30"

  subway-arrival: # DEPRECATED
    enabled: false
    cron: "0 */1 * * * *"
    flush-cron: "0 */30 * * * *"
    reset-cron: "0 0 5 * * *"
  static-data:
    cron: "0 0 3 * * *"


# logging / cors 는 application-{dev,prod}.yaml 에서 설정

realtime:
  subway:
    # enabled / persist-raw-arrivals 는 application-{dev,prod}.yaml 에서 설정
    poll-interval-ms: 1000
    active-hours:
      start: "04:30"
      end: "01:00"
    snapshot-ttl-seconds: 20

batch:
  # *.enabled 는 application-{dev,prod}.yaml 에서 설정
  inferred-completion:
    line-ids: "1002,1005,1006,1007"
    dedup-window-minutes: 5
  delay-truth:
    # v1: legacy ORDINAL 강제 매칭 + OUTLIER_DELAY 학습 제외
    # v2: count guard + 30분 time-window + known-known destination hard reject
    matching-version: v2
    # V2 시간창. |delay| 초과 시 group-level reject → truth row 미생성, issue로만 저장
    max-match-distance-seconds: 1800
  persistence:
    # 일자 단위 issue/truth bulk insert chunk 크기. heap bloat 방지를 위해 chunk 저장 후
    # SubwayDataService.flushAndClear()로 1차 캐시를 비운다.
    issue-chunk-size: 1000
    truth-chunk-size: 2000
    bus-label-chunk-size: 2000
  bus-label:
    correction-window-minutes: 10
